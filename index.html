<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judiciary Information System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ Judiciary Information System</h1>
            <p>Case Management System</p>
        </header>

        <div class="main-content">
            <!-- Case Input Section -->
            <section class="input-section">
                <h2>Add New Case</h2>
                <form id="caseForm">
                    <div class="form-group">
                        <label for="caseNumber">Case Number:</label>
                        <input type="text" id="caseNumber" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="caseType">Case Type:</label>
                        <select id="caseType" required>
                            <option value="">Select Type</option>
                            <option value="Criminal">Criminal</option>
                            <option value="Civil">Civil</option>
                            <option value="Family">Family</option>
                            <option value="Property">Property</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="caseDescription">Case Description:</label>
                        <textarea id="caseDescription" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="severityLevel">Severity Level:</label>
                        <select id="severityLevel">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>

                    <!-- Add this to the form section after severity level -->
                    <div class="form-group">
                        <label for="caseStatus">Initial Status:</label>
                        <select id="caseStatus">
                            <option value="Pending">Pending</option>
                            <option value="Active">Active</option>
                            <option value="Solved">Solved</option>
                        </select>
                    </div>

                    <button type="submit">Add Case</button>
                </form>
            </section>

            <!-- Case Display Section -->
            <section class="display-section">
                <h2>Case Records 
                    <span class="case-count">(Total: <span id="totalCases">0</span>)</span>
                </h2>
                
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search cases...">
                    <button onclick="searchCases()">Search</button>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <h3>Criminal Cases</h3>
                        <span id="criminalCount">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>High Severity</h3>
                        <span id="highSeverityCount">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>Pending Analysis</h3>
                        <span id="pendingCount">0</span>
                    </div>
                </div>

                <div id="casesList" class="cases-list">
                    <!-- Cases will be displayed here -->
                </div>

                <!-- AI Analysis Results -->
                <div id="aiAnalysis" class="ai-analysis" style="display: none;">
                    <h3>🤖 AI Case Analysis</h3>
                    <div id="analysisResults"></div>
                </div>

            </section>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
